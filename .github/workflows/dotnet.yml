name: Deploy to VPS (rsync)
on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # If you have a Node build. Remove if not needed.
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install & build
        if: hashFiles('package-lock.json') != ''
        run: |
          npm ci
          npm run build --if-present

      # Pick build output automatically (dist/build/out/public) or fallback to repo root
      - name: Resolve deploy source
        id: src
        run: |
          set -e
          if   [ -d dist ];   then echo "dir=dist"   >> $GITHUB_OUTPUT
          elif [ -d build ];  then echo "dir=build"  >> $GITHUB_OUTPUT
          elif [ -d out ];    then echo "dir=out"    >> $GITHUB_OUTPUT
          elif [ -d public ]; then echo "dir=public" >> $GITHUB_OUTPUT
          else echo "dir=."   >> $GITHUB_OUTPUT; fi
          echo "Using folder: $(cat $GITHUB_OUTPUT)"

      - name: Add SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Setup known_hosts
        run: |
          mkdir -p ~/.ssh
          if [ -n "${{ secrets.KNOWN_HOSTS }}" ]; then
            echo "${{ secrets.KNOWN_HOSTS }}" >> ~/.ssh/known_hosts
          else
            ssh-keyscan -p "${{ secrets.SSH_PORT }}" "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts
          fi

      - name: Rsync to VPS
        run: |
          rsync -az --delete \
            --exclude ".git" \
            --exclude "node_modules" \
            -e "ssh -p ${{ secrets.SSH_PORT }}" \
            "${{ steps.src.outputs.dir }}/" \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.VPS_DIR }}/"

      - name: Post-deploy (permissions & reload web server)
        run: |
          ssh -p "${{ secrets.SSH_PORT }}" "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" << 'EOF'
          set -eux
          sudo chown -R www-data:www-data "${{ secrets.VPS_DIR }}"
          sudo find "${{ secrets.VPS_DIR }}" -type d -exec chmod 755 {} \;
          sudo find "${{ secrets.VPS_DIR }}" -type f -exec chmod 644 {} \;
          if command -v systemctl >/dev/null 2>&1; then
            sudo systemctl reload nginx || true
            sudo systemctl reload apache2 || true
          fi
          EOF
